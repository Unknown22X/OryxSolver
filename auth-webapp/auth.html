<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In | OryxSolver</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.auth0.com/js/auth0-spa-js/2.1/auth0-spa-js.production.js"></script>
    <script src="./config.js"></script>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>OryxSolver Sign In</h1>
        <p class="muted">Continue with your account to sync plan and usage across the extension.</p>

        <div id="status" class="status">Ready</div>

        <div class="stack">

          <button id="signup" class="btn btn-secondary">Create Account</button>
          <a class="btn btn-secondary" href="./index.html">Back to Home</a>
        </div>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
