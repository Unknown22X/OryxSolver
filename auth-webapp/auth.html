<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In | OryxSolver</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./config.js"></script>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>OryxSolver Sign In</h1>
        <p class="muted">Continue with your account to sync plan and usage across the extension.</p>

        <div id="status" class="status">Ready</div>

        <div class="stack">
          <div class="input-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="you@example.com" />
          </div>
          <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" />
          </div>
          <button id="login" class="btn btn-primary">Sign In</button>
          <button id="signup" class="btn btn-secondary">Create Account</button>
          <div class="divider">or</div>
          <button id="google-login" class="btn btn-secondary btn-outline">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" alt="" />
            Continue with Google
          </button>
          <a class="btn btn-ghost" href="./index.html">Back to Home</a>
        </div>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
