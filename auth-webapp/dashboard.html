<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard | OryxSolver</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./config.js"></script>
  </head>
  <body>
    <div class="page">
      <header class="nav">
        <div class="container nav-inner">
          <div class="brand">OryxSolver <span class="brand-dot">Admin</span></div>
          <nav class="nav-links">
            <a class="nav-link" href="./index.html">Home</a>
            <button id="logout" class="btn btn-ghost">Sign Out</button>
          </nav>
        </div>
      </header>

      <main class="container">
        <section class="section">
          <h1>Analytics Overview</h1>
          <p id="status" class="status">Loading analytics...</p>

          <div id="stats-grid" class="dashboard-grid hidden">
            <article class="stat-card">
              <h4>Total Solves</h4>
              <div id="total-solves" class="value">0</div>
            </article>
            <article class="stat-card">
              <h4>Active Users</h4>
              <div id="active-users" class="value">0</div>
            </article>
            <article class="stat-card">
              <h4>Capture Success Rate</h4>
              <div id="capture-rate" class="value">0%</div>
            </article>
            <article class="stat-card">
              <h4>Conversion (Go Pro)</h4>
              <div id="conversion-rate" class="value">0%</div>
            </article>
          </div>

          <div id="admin-error" class="card hidden" style="margin-top: 2rem; border-color: #dc2626; background: #fef2f2;">
            <h2 style="color: #dc2626;">Access Denied</h2>
            <p>You do not have administrator permissions to view this dashboard.</p>
            <a class="btn btn-primary" href="./auth.html">Sign in as Admin</a>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="./dashboard.js"></script>
  </body>
</html>
