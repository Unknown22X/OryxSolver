<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Search Engine & Social Media Optimization -->
    <link rel="canonical" href="https://oryxsolver.com" />
    <meta property="og:title" content="OryxSolver | AI Study Companion & Problem Solver" />
    <meta property="og:description" content="Capture questions for clearer, faster explanations. AI-powered homework helper and problem solver." />
    <meta property="og:image" content="https://oryxsolver.com/logo-full.png" />
    <meta property="og:url" content="https://oryxsolver.com" />
    <meta property="og:type" content="website" />
    
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="OryxSolver | AI Study Companion & Problem Solver" />
    <meta name="twitter:description" content="Capture questions for clearer, faster explanations. AI-powered homework helper and problem solver." />
    <meta name="twitter:image" content="https://oryxsolver.com/logo-full.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="OryxSolver - Capture questions for clearer, faster explanations while keeping your study flow moving. AI-powered homework helper and problem solver." />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="google-site-verification" content="mSX8pPI8IPC-FVZvxQ5dT5Rj84K2kei6tXNM8D0XY78" />
    <title>OryxSolver | AI Study Companion & Problem Solver</title>

    <!-- Structured Data for Google Search -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "OryxSolver",
      "url": "https://oryxsolver.com",
      "logo": "https://oryxsolver.com/logo-full.png"
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "OryxSolver",
      "url": "https://oryxsolver.com"
    }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Work+Sans:wght@400;500;600;700&family=Cairo:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <!-- Set dir immediately to avoid flash of wrong direction -->
    <script>
      (function () {
        var lang = localStorage.getItem('oryx_language') || 'en';
        document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
        document.documentElement.lang = lang;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
