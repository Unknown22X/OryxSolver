name: extension-ci

on:
  push:
    paths:
      - "extension/**"
      - ".github/workflows/extension-ci.yml"
  pull_request:
    paths:
      - "extension/**"
      - ".github/workflows/extension-ci.yml"

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build
