<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OryxSolver Side Panel</title>
    <link rel="preconnect" href="https://vppskstgipstrylyidmu.supabase.co" crossorigin />
    <link rel="preconnect" href="https://api.oryxsolver.com" crossorigin />
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at 50% -20%, rgba(99, 102, 241, 0.18), transparent 55%), #0a0c1b;
      }
      #oryx-initial-loader {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        z-index: 9999;
      }
      #oryx-initial-loader .loader-shell {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        color: #e2e8f0;
        font-family: ui-sans-serif, -apple-system, Segoe UI, sans-serif;
      }
      #oryx-initial-loader .spinner {
        width: 28px;
        height: 28px;
        border-radius: 9999px;
        border: 3px solid rgba(99, 102, 241, 0.25);
        border-top-color: #6366f1;
        animation: spin 0.9s linear infinite;
      }
      #oryx-initial-loader .label {
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        font-weight: 800;
        opacity: 0.9;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
</head>
<body>
<div id="oryx-initial-loader" role="status" aria-live="polite">
  <div class="loader-shell">
    <div class="spinner" aria-hidden="true"></div>
    <div class="label">Opening Oryx</div>
  </div>
</div>
<div id="root"></div>
<script type="module" src="./index.tsx"></script>
</body>
</html>
